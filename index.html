<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#ffe6f2;
    padding:40px;
}

#message{
    display:none;
}

img{
    max-width:300px;
    border-radius:15px;
}
</style>
</head>

<body>

<h1>🎂 A Special Surprise 🎂</h1>

<div id="countdown"></div>

<div id="message">
    <h2>Happy Birthday! 🎉</h2>

    <p>
        Dear Friend,<br><br>
        Wishing you a wonderful birthday filled with joy, happiness and success.
        Have an amazing year ahead! ❤️
    </p>

    <img src="IMG20260308103705.jpg" alt="Birthday Photo">
</div>

<script>
const targetDate = new Date("July 09, 2026 14:05:00").getTime();

const timer = setInterval(function() {

const now = new Date().getTime();
const distance = targetDate - now;

if(distance <= 0){
    clearInterval(timer);
    document.getElementById("countdown").style.display="none";
    document.getElementById("message").style.display="block";
    return;
}

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
days + " Days " +
hours + " Hours " +
minutes + " Minutes " +
seconds + " Seconds";

},1000);
</script>

</body>
</html>
